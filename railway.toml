# Railway deploy configuration — shared by all services in this repo.
#
# The [build] section is intentionally omitted. Both the backend (Dockerfile)
# and the frontend (Dockerfile.web) services point at this same repository
# root, so the Dockerfile path MUST be set per-service in the Railway
# dashboard (Service → Settings → Build → Dockerfile Path) rather than here.
# Putting a [build] block here would force the Go Dockerfile on every service,
# breaking the Node.js/pnpm frontend build.
#
# See RAILWAY.md for the full step-by-step deployment guide.

[deploy]
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
